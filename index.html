<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#7C3AED">
<title>Kinexa — Configuración</title>
<style>
  :root{
    --violeta:#7C3AED; --violeta-800:#5B21B6; --violeta-900:#3F1D74;
    --lila:#A78BFA; --lila-200:#DDD6FE; --lila-50:#F3F0FD;
    --tinta:#231640; --tinta-60:#6B6480; --tinta-40:#9B94AD;
    --papel:#FFFFFF; --nube:#F7F5FB; --borde:#E7E3F0; --borde-fuerte:#D4CDE6;
    --ok:#0E9F6E; --ok-bg:#E7F6EF; --err:#DC2626; --err-bg:#FCECEC;
    --r:10px; --sombra:0 1px 2px rgba(35,22,64,.06), 0 8px 30px rgba(35,22,64,.06);
  }
  *{ box-sizing:border-box }
  html,body{ margin:0; height:100% }
  body{
    font-family:'Segoe UI',system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
    color:var(--tinta); background:var(--nube); line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }
  button{ font-family:inherit; cursor:pointer }
  input,select{ font-family:inherit; font-size:14px }

  .app{ min-height:100vh; display:flex }

  /* ── Panel de marca ── */
  .marca{
    width:320px; flex-shrink:0; background:var(--violeta-900); color:#fff;
    padding:34px 30px; display:flex; flex-direction:column; gap:34px;
  }
  .logo{ display:flex; align-items:center; gap:12px }
  .logo .nombre{ font-size:26px; font-weight:600; letter-spacing:-1px }
  .logo .nombre .xa{ color:var(--lila) }
  .eslogan{ color:var(--lila-200); font-size:13.5px; margin-top:2px }
  .marca-pasos{ display:flex; flex-direction:column; gap:2px; margin-top:6px }
  .mp{ display:flex; align-items:center; gap:13px; padding:11px 12px; border-radius:var(--r); color:var(--lila-200); font-size:14px; transition:.15s }
  .mp .n{ width:26px; height:26px; border-radius:50%; border:1.5px solid rgba(255,255,255,.25); display:grid; place-items:center; font-size:12.5px; flex-shrink:0 }
  .mp.activo{ background:rgba(255,255,255,.10); color:#fff }
  .mp.activo .n{ background:var(--violeta); border-color:var(--violeta) }
  .mp.hecho{ color:#fff }
  .mp.hecho .n{ background:var(--lila); border-color:var(--lila); color:var(--violeta-900) }
  .marca-pie{ margin-top:auto; font-size:11.5px; color:rgba(255,255,255,.45) }

  /* ── Contenido ── */
  .lienzo{ flex:1; display:flex; flex-direction:column; align-items:center; padding:40px 24px 60px; overflow-y:auto }
  .panel{ width:100%; max-width:620px }
  .encabezado h1{ font-size:24px; font-weight:600; letter-spacing:-.5px; margin:0 0 4px }
  .encabezado p{ color:var(--tinta-60); margin:0 0 26px; font-size:14.5px }

  .card{ background:var(--papel); border:1px solid var(--borde); border-radius:14px; box-shadow:var(--sombra); padding:24px }

  .campo{ margin-bottom:18px }
  .campo:last-child{ margin-bottom:0 }
  label.lab{ display:block; font-size:12.5px; font-weight:600; color:var(--tinta); margin-bottom:6px }
  .hint{ font-size:12px; color:var(--tinta-40); margin-top:5px }
  input.txt, select.txt{
    width:100%; padding:11px 13px; border:1.5px solid var(--borde-fuerte); border-radius:var(--r);
    background:#fff; color:var(--tinta); transition:.15s;
  }
  input.txt:focus, select.txt:focus{ outline:none; border-color:var(--violeta); box-shadow:0 0 0 3px var(--lila-50) }
  .fila{ display:flex; gap:12px }
  .fila > *{ flex:1 }

  .plegable{ border:1px dashed var(--borde-fuerte); border-radius:var(--r); padding:14px 16px; margin-top:8px; background:var(--nube) }
  .plegable summary{ cursor:pointer; font-size:13px; font-weight:600; color:var(--violeta-800); list-style:none }
  .plegable summary::-webkit-details-marker{ display:none }
  .plegable summary::before{ content:'+ '; }
  .plegable[open] summary::before{ content:'– '; }
  .plegable .cuerpo{ margin-top:14px }

  /* logo uploader */
  .logo-drop{ display:flex; align-items:center; gap:16px }
  .logo-prev{ width:66px; height:66px; border-radius:14px; border:1.5px dashed var(--borde-fuerte); background:var(--nube); display:grid; place-items:center; overflow:hidden; flex-shrink:0; color:var(--tinta-40); font-size:11px; text-align:center }
  .logo-prev img{ width:100%; height:100%; object-fit:contain }

  /* botones */
  .btn{ border:none; border-radius:var(--r); padding:11px 18px; font-size:14px; font-weight:600; transition:.15s }
  .btn-primario{ background:var(--violeta); color:#fff }
  .btn-primario:hover{ background:var(--violeta-800) }
  .btn-primario:disabled{ background:var(--borde-fuerte); color:#fff; cursor:not-allowed }
  .btn-fantasma{ background:transparent; color:var(--tinta-60); border:1.5px solid var(--borde-fuerte) }
  .btn-fantasma:hover{ border-color:var(--tinta-40); color:var(--tinta) }
  .btn-sm{ padding:7px 12px; font-size:12.5px }
  .btn-add{ background:var(--lila-50); color:var(--violeta-800); border:1.5px dashed var(--lila); width:100%; padding:12px }
  .btn-add:hover{ background:#fff }
  .icon-x{ background:none; border:none; color:var(--tinta-40); font-size:18px; line-height:1; padding:4px 8px; border-radius:6px }
  .icon-x:hover{ color:var(--err); background:var(--err-bg) }

  .pie{ display:flex; justify-content:space-between; align-items:center; margin-top:22px }

  /* items dinámicos */
  .item{ border:1px solid var(--borde); border-radius:12px; padding:16px; margin-bottom:12px; background:#fff }
  .item-top{ display:flex; justify-content:space-between; align-items:center; margin-bottom:12px }
  .item-top .t{ font-weight:600; font-size:14px; color:var(--violeta-800) }
  .chips{ display:flex; flex-wrap:wrap; gap:6px; margin-top:10px }
  .chip{ background:var(--lila-50); color:var(--violeta-800); border:1px solid var(--lila-200); border-radius:20px; padding:3px 11px; font-size:12px; font-weight:600 }
  .vacio{ color:var(--tinta-40); font-size:13px; text-align:center; padding:18px 0 6px }

  .adm{ display:flex; align-items:center; gap:8px; font-size:13px; color:var(--tinta-60); user-select:none; cursor:pointer; margin-top:12px }
  .adm input{ width:16px; height:16px; accent-color:var(--violeta) }

  .badge-adm{ background:var(--violeta); color:#fff; border-radius:20px; padding:2px 9px; font-size:11px; font-weight:600 }

  /* resumen */
  .res-bloque{ padding:16px 0; border-bottom:1px solid var(--borde) }
  .res-bloque:last-child{ border-bottom:none }
  .res-bloque h3{ font-size:12.5px; text-transform:uppercase; letter-spacing:.5px; color:var(--tinta-40); margin:0 0 8px }
  .res-linea{ display:flex; justify-content:space-between; gap:12px; font-size:14px; padding:3px 0 }
  .res-linea .k{ color:var(--tinta-60) }
  .res-linea .v{ font-weight:600; text-align:right }

  .aviso{ font-size:12.5px; padding:10px 13px; border-radius:var(--r); margin-top:14px }
  .aviso-warn{ background:#FEF6E7; color:#93610A; border:1px solid #F7E0A8 }

  /* pantalla lista */
  .listo{ text-align:center; max-width:560px }
  .listo .tick{ width:64px; height:64px; border-radius:50%; background:var(--ok-bg); color:var(--ok); display:grid; place-items:center; font-size:32px; margin:0 auto 18px }

  /* ── Login ── */
  .login-wrap{ align-items:center; justify-content:center }
  .login-card{ max-width:400px; width:100%; background:#fff; border:1px solid var(--borde); border-radius:16px; box-shadow:var(--sombra); padding:30px }
  .login-head{ display:flex; align-items:center; gap:14px; margin-bottom:4px }
  .login-logo{ width:52px; height:52px; border-radius:12px; object-fit:contain; border:1px solid var(--borde) }
  .login-inst{ font-size:13px; color:var(--tinta-60); margin-top:2px }

  /* ── Dashboard ── */
  .dash{ min-height:100vh; display:flex; flex-direction:column }
  .topbar{ background:var(--violeta-900); color:#fff; display:flex; justify-content:space-between; align-items:center; padding:14px 22px; gap:12px }
  .tb-left{ display:flex; align-items:center; gap:12px }
  .tb-logo{ width:34px; height:34px; border-radius:9px; object-fit:contain; background:#fff }
  .tb-inst{ font-weight:600; font-size:15px }
  .tb-sub{ font-size:12px; color:var(--lila-200) }
  .tb-right{ display:flex; align-items:center; gap:12px }
  .tb-user{ font-size:13px; display:flex; align-items:center; gap:8px }
  .dash-body{ flex:1; padding:30px 22px 60px; display:flex; justify-content:center }
  .dash-inner{ width:100%; max-width:820px }
  .dash-title{ display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; gap:12px }
  .dash-title h1{ font-size:22px; margin:0; letter-spacing:-.5px }
  .sec-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:14px }
  @media (max-width:560px){ .topbar{ flex-direction:column; align-items:flex-start } .tb-right{ width:100%; justify-content:space-between } }

  @media (max-width:820px){
    .app{ flex-direction:column }
    .marca{ width:100%; flex-direction:row; align-items:center; gap:16px; padding:18px 20px }
    .marca-pasos,.marca-pie{ display:none }
    .eslogan{ display:none }
    .lienzo{ padding:26px 16px 48px }
  }
  @media (prefers-reduced-motion:reduce){ *{ transition:none !important } }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
/* ============ CONEXIÓN A LA BASE CENTRAL DE KINEXA ============ */
const SUPABASE_URL = 'https://maelwlpswshjqglkuxon.supabase.co';
const SUPABASE_KEY = 'sb_publishable_TTpUzACOs4HKIijl2Cotkg_folBERd1';
const SB_HEADERS = { 'apikey':SUPABASE_KEY, 'Content-Type':'application/json' };

async function rpc(fn, args){
  const r = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${fn}`, { method:'POST', headers:SB_HEADERS, body:JSON.stringify(args||{}) });
  if(!r.ok){ throw new Error((await r.text())||('HTTP '+r.status)); }
  const t = await r.text(); return t ? JSON.parse(t) : null;
}

/* ── Sesión ── */
let TOKEN = null, USER = null;
function guardarSesion(u){ TOKEN=u.token; USER=u; localStorage.setItem('kinexa_token',u.token); localStorage.setItem('kinexa_user',JSON.stringify(u)); }
function limpiarSesion(){ TOKEN=null; USER=null; localStorage.removeItem('kinexa_token'); localStorage.removeItem('kinexa_user'); }

/* ============ PANTALLA DE INICIO ============ */
function pantallaInicio(){
  $('#app').innerHTML = `
    <main class="lienzo login-wrap">
      <div class="panel login-card" style="text-align:center">
        <div style="margin:0 auto 6px">${isotipo(60)}</div>
        <div class="nombre" style="font-size:26px;font-weight:600;letter-spacing:-1px">Kine<span style="color:var(--violeta)">xa</span></div>
        <div class="login-inst" style="margin-bottom:22px">La evolución digital de la kinesiología</div>
        <button class="btn btn-primario" style="width:100%;margin-bottom:10px" onclick="pantallaLogin()">Ingresar</button>
        <button class="btn btn-fantasma" style="width:100%" onclick="empezarRegistro()">Registrar mi institución</button>
      </div>
    </main>`;
}
function empezarRegistro(){
  modoEdicion=false; uid=1;
  cfg={ institucion:{nombre:'',logo:''}, sectores:[], usuarios:[] };
  paso=1; render();
}

let paso = 1;
let modoEdicion = false;
let cfg = {
  institucion:{ nombre:'', logo:'' },
  sectores:[],
  usuarios:[]
};
let uid = 1;

const PASOS = [
  { n:1, t:'Institución',    d:'Identidad del servicio' },
  { n:2, t:'Sectores',       d:'Salas y camas' },
  { n:3, t:'Usuarios',       d:'Equipo y administradores' },
  { n:4, t:'Revisar',        d:'Confirmar y finalizar' },
];

/* ============ MONOGRAMA ============ */
function isotipo(px){
  return `<svg width="${px}" height="${px}" viewBox="0 0 100 100" aria-hidden="true">
    <rect x="2" y="2" width="96" height="96" rx="21" fill="#7C3AED"/>
    <rect x="32" y="27" width="9" height="46" rx="4.5" fill="#fff"/>
    <path d="M41 50 L66 29 M41 50 L66 73" stroke="#fff" stroke-width="8.5" stroke-linecap="round" fill="none"/>
    <circle cx="70.5" cy="26.5" r="4.5" fill="#C4B5FD"/>
  </svg>`;
}

/* ============ HELPERS ============ */
const $ = s => document.querySelector(s);
function esc(s){ return String(s??'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function letra(i){ // 0->A ... genera AA, AB tras la Z
  let s=''; i++; while(i>0){ i--; s=String.fromCharCode(65+(i%26))+s; i=Math.floor(i/26); } return s;
}
function generarCamas(sec){
  const c = parseInt(sec.cantidad,10);
  if(sec.tipo==='numeros'){ return c>0 ? Array.from({length:Math.min(c,200)},(_,i)=>String(i+1)) : []; }
  if(sec.tipo==='letras'){ return c>0 ? Array.from({length:Math.min(c,200)},(_,i)=>letra(i)) : []; }
  // personalizado
  return (sec.personalizado||'').split(/[,\s]+/).map(x=>x.trim()).filter(Boolean).slice(0,200);
}

/* ============ VALIDACIÓN POR PASO ============ */
function pasoValido(n){
  if(n===1){
    return !!cfg.institucion.nombre.trim();
  }
  if(n===2){
    return cfg.sectores.length>0 && cfg.sectores.every(s=> s.nombre.trim() && generarCamas(s).length>0);
  }
  if(n===3){
    const us = cfg.usuarios;
    if(modoEdicion && us.length===0) return true; // en edición, agregar usuarios es opcional
    return us.length>0 && us.every(u=>u.nombre.trim()&&u.apellido.trim()&&u.dni.trim()) && us.some(u=>u.admin);
  }
  return true;
}

/* ============ RENDER PRINCIPAL ============ */
function render(){
  $('#app').innerHTML = `
    <aside class="marca">
      <div>
        <div class="logo">${isotipo(40)}<div><div class="nombre">Kine<span class="xa">xa</span></div></div></div>
        <div class="eslogan">La evolución digital de la kinesiología</div>
      </div>
      <nav class="marca-pasos">
        ${PASOS.map(p=>`
          <div class="mp ${p.n===paso?'activo':''} ${p.n<paso?'hecho':''}">
            <span class="n">${p.n<paso?'✓':p.n}</span>
            <div><div>${p.t}</div></div>
          </div>`).join('')}
      </nav>
      <div class="marca-pie">Configuración inicial · v0.1</div>
    </aside>
    <main class="lienzo"><div class="panel" id="panel"></div></main>`;
  const cont = { 1:pasoInstitucion, 2:pasoSectores, 3:pasoUsuarios, 4:pasoRevisar }[paso];
  cont();
}

function pieNav(){
  return `<div class="pie">
    ${paso>1 ? `<button class="btn btn-fantasma" onclick="irPaso(${paso-1})">← Atrás</button>` : `<button class="btn btn-fantasma" onclick="cancelarWizard()">Cancelar</button>`}
    ${paso<4
      ? `<button class="btn btn-primario" id="btnSig" onclick="irPaso(${paso+1})" ${pasoValido(paso)?'':'disabled'}>Siguiente →</button>`
      : `<button class="btn btn-primario" onclick="finalizar()">Finalizar configuración</button>`}
  </div>`;
}
function irPaso(n){ if(n>paso && !pasoValido(paso)) return; paso=n; render(); }
function refrescarNav(){ const b=$('#btnSig'); if(b) b.disabled=!pasoValido(paso); }

/* ============ PASO 1 · INSTITUCIÓN ============ */
function pasoInstitucion(){
  const i=cfg.institucion;
  $('#panel').innerHTML = `
    <div class="encabezado"><h1>Datos de la institución</h1>
      <p>Con esto Kinexa arma la identidad del servicio: aparece en el encabezado, el login y los informes.</p></div>
    <div class="card">
      <div class="campo">
        <label class="lab">Nombre de la institución</label>
        <input class="txt" id="inNombre" placeholder="Ej: Hospital San Martín — Servicio de Kinesiología"
          value="${esc(i.nombre)}" oninput="cfg.institucion.nombre=this.value; refrescarNav()">
      </div>
      <div class="campo">
        <label class="lab">Logo de la institución <span style="font-weight:400;color:var(--tinta-40)">(opcional)</span></label>
        <div class="logo-drop">
          <div class="logo-prev" id="logoPrev">${i.logo?`<img src="${i.logo}">`:'Sin<br>logo'}</div>
          <div>
            <input type="file" id="inLogo" accept="image/*" style="display:none" onchange="subirLogo(event)">
            <button class="btn btn-fantasma btn-sm" onclick="document.getElementById('inLogo').click()">Subir imagen</button>
            ${i.logo?`<button class="btn btn-fantasma btn-sm" style="margin-left:6px" onclick="quitarLogo()">Quitar</button>`:''}
            <div class="hint">PNG, JPG o SVG. Aparece en el encabezado y en los informes.</div>
          </div>
        </div>
      </div>
    </div>
    ${pieNav()}`;
}
function subirLogo(e){
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ cfg.institucion.logo=r.result; pasoInstitucion(); };
  r.readAsDataURL(f);
}
function quitarLogo(){ cfg.institucion.logo=''; pasoInstitucion(); }

/* ============ PASO 2 · SECTORES ============ */
function pasoSectores(){
  $('#panel').innerHTML = `
    <div class="encabezado"><h1>Sectores y camas</h1>
      <p>Cargá cada sector donde participa kinesiología y definí sus camas. Podés numerarlas o usar letras.</p></div>
    <div id="listaSec">${cfg.sectores.map(renderSector).join('') || `<div class="card"><div class="vacio">Todavía no agregaste sectores.</div></div>`}</div>
    <button class="btn btn-add" style="margin-top:4px" onclick="addSector()">+ Agregar sector</button>
    ${pieNav()}`;
}
function renderSector(s){
  const camas=generarCamas(s);
  return `<div class="item">
    <div class="item-top">
      <span class="t">Sector</span>
      <button class="icon-x" title="Eliminar" onclick="delSector(${s.id})">✕</button>
    </div>
    <div class="campo">
      <label class="lab">Nombre del sector</label>
      <input class="txt" placeholder="Ej: UTI A, Emergencias, Cuidados Mínimos"
        value="${esc(s.nombre)}" oninput="setSector(${s.id},'nombre',this.value)">
    </div>
    <div class="fila">
      <div class="campo" style="margin-bottom:0">
        <label class="lab">Numeración de camas</label>
        <select class="txt" onchange="setSector(${s.id},'tipo',this.value)">
          <option value="numeros" ${s.tipo==='numeros'?'selected':''}>Números (1, 2, 3…)</option>
          <option value="letras" ${s.tipo==='letras'?'selected':''}>Letras (A, B, C…)</option>
          <option value="personalizado" ${s.tipo==='personalizado'?'selected':''}>Personalizado</option>
        </select>
      </div>
      <div class="campo" style="margin-bottom:0">
        ${s.tipo==='personalizado'
          ? `<label class="lab">Camas (separadas por coma)</label>
             <input class="txt" placeholder="1, 2, 3B, box1" value="${esc(s.personalizado||'')}"
               oninput="setSector(${s.id},'personalizado',this.value)">`
          : `<label class="lab">Cantidad de camas</label>
             <input class="txt" type="number" min="1" max="200" placeholder="Ej: 12"
               value="${esc(s.cantidad||'')}" oninput="setSector(${s.id},'cantidad',this.value)">`}
      </div>
    </div>
    <div class="chips" id="chips-${s.id}">${camas.map(c=>`<span class="chip">${esc(c)}</span>`).join('')}</div>
  </div>`;
}
function addSector(){ cfg.sectores.push({id:uid++, nombre:'', tipo:'numeros', cantidad:'', personalizado:''}); pasoSectores(); }
function delSector(id){ cfg.sectores=cfg.sectores.filter(s=>s.id!==id); pasoSectores(); }
function setSector(id,campo,val){
  const s=cfg.sectores.find(x=>x.id===id); if(!s) return; s[campo]=val;
  if(campo==='tipo'){ pasoSectores(); return; }
  const box=document.getElementById('chips-'+id);
  if(box){ box.innerHTML=generarCamas(s).map(c=>`<span class="chip">${esc(c)}</span>`).join(''); }
  refrescarNav();
}

/* ============ PASO 3 · USUARIOS ============ */
function pasoUsuarios(){
  const nAdmin = cfg.usuarios.filter(u=>u.admin).length;
  $('#panel').innerHTML = `
    <div class="encabezado"><h1>Usuarios del servicio</h1>
      <p>Cargá a quienes van a acceder. Marcá al menos un administrador (acceso total a la información y a la configuración).</p></div>
    <div id="listaUsr">${cfg.usuarios.map(renderUsuario).join('') || `<div class="card"><div class="vacio">Todavía no agregaste usuarios.</div></div>`}</div>
    <button class="btn btn-add" style="margin-top:4px" onclick="addUsuario()">+ Agregar usuario</button>
    ${nAdmin===0 && cfg.usuarios.length>0 ? `<div class="aviso aviso-warn">Marcá al menos un usuario como administrador para poder continuar.</div>`:''}
    ${pieNav()}`;
}
function renderUsuario(u){
  return `<div class="item">
    <div class="item-top">
      <span class="t">Usuario ${u.admin?`<span class="badge-adm">Administrador</span>`:''}</span>
      <button class="icon-x" title="Eliminar" onclick="delUsuario(${u.id})">✕</button>
    </div>
    <div class="fila">
      <div class="campo" style="margin-bottom:0">
        <label class="lab">Nombre</label>
        <input class="txt" value="${esc(u.nombre)}" oninput="setUsuario(${u.id},'nombre',this.value)">
      </div>
      <div class="campo" style="margin-bottom:0">
        <label class="lab">Apellido</label>
        <input class="txt" value="${esc(u.apellido)}" oninput="setUsuario(${u.id},'apellido',this.value)">
      </div>
    </div>
    <div class="campo" style="margin-top:14px;margin-bottom:0">
      <label class="lab">DNI</label>
      <input class="txt" inputmode="numeric" placeholder="Sin puntos" value="${esc(u.dni)}"
        oninput="setUsuario(${u.id},'dni',this.value)">
    </div>
    <label class="adm"><input type="checkbox" ${u.admin?'checked':''} onchange="setUsuario(${u.id},'admin',this.checked)"> Administrador</label>
  </div>`;
}
function addUsuario(){ cfg.usuarios.push({id:uid++, nombre:'', apellido:'', dni:'', admin:cfg.usuarios.length===0}); pasoUsuarios(); }
function delUsuario(id){ cfg.usuarios=cfg.usuarios.filter(u=>u.id!==id); pasoUsuarios(); }
function setUsuario(id,campo,val){
  const u=cfg.usuarios.find(x=>x.id===id); if(!u) return; u[campo]=val;
  if(campo==='admin') pasoUsuarios(); else refrescarNav();
}

/* ============ PASO 4 · REVISAR ============ */
function pasoRevisar(){
  const i=cfg.institucion;
  const totalCamas = cfg.sectores.reduce((a,s)=>a+generarCamas(s).length,0);
  const admins = cfg.usuarios.filter(u=>u.admin);
  $('#panel').innerHTML = `
    <div class="encabezado"><h1>Revisá antes de finalizar</h1>
      <p>Si algo no está bien, volvé con “Atrás”. Al finalizar, la configuración se guarda en la base de datos de la institución.</p></div>
    <div class="card">
      <div class="res-bloque">
        <h3>Institución</h3>
        <div class="res-linea"><span class="k">Nombre</span><span class="v">${esc(i.nombre)||'—'}</span></div>
        <div class="res-linea"><span class="k">Logo</span><span class="v">${i.logo?'Cargado':'Sin logo'}</span></div>
      </div>
      <div class="res-bloque">
        <h3>Sectores (${cfg.sectores.length}) · ${totalCamas} camas</h3>
        ${cfg.sectores.map(s=>`<div class="res-linea"><span class="k">${esc(s.nombre)}</span><span class="v">${generarCamas(s).length} camas</span></div>`).join('')||'<div class="vacio">—</div>'}
      </div>
      <div class="res-bloque">
        <h3>Usuarios ${modoEdicion?'a agregar':''} (${cfg.usuarios.length}) · ${admins.length} admin</h3>
        ${cfg.usuarios.map(u=>`<div class="res-linea"><span class="k">${esc(u.apellido)}, ${esc(u.nombre)} · DNI ${esc(u.dni)}</span><span class="v">${u.admin?'<span class="badge-adm">Admin</span>':'Kinesiólogo/a'}</span></div>`).join('')||'<div class="vacio">—</div>'}
      </div>
    </div>
    ${pieNav()}`;
}

/* ============ FINALIZAR ============ */
async function finalizar(){
  const btn = document.querySelector('.pie .btn-primario');
  if(btn){ btn.disabled=true; btn.textContent='Guardando…'; }
  const inst = { nombre:cfg.institucion.nombre.trim(), logo:cfg.institucion.logo||'' };
  const usuarios = cfg.usuarios.map(u=>({ nombre:u.nombre.trim(), apellido:u.apellido.trim(), dni:String(u.dni).trim(), admin:!!u.admin }));
  const sectores = cfg.sectores.map(s=>({ nombre:s.nombre.trim(), camas:generarCamas(s) }));
  try{
    if(modoEdicion){
      await rpc('kinexa_setup', { p_token:TOKEN, p_config:{ institucion:inst, sectores, usuarios } });
      modoEdicion=false;
      await irDashboard();
      return;
    }
    // ── Alta automática de institución ──
    const admin = usuarios.find(u=>u.admin);
    const instId = await rpc('kinexa_registrar', { p_institucion:inst, p_admin:{ nombre:admin.nombre, apellido:admin.apellido, dni:admin.dni } });
    const login = await rpc('kinexa_login', { p_institucion_id:instId, p_dni:admin.dni, p_clave:admin.dni });
    if(!login || login.length===0) throw new Error('No se pudo iniciar sesión tras el registro.');
    guardarSesion(login[0]);
    await rpc('kinexa_setup', { p_token:TOKEN, p_config:{ institucion:inst, sectores, usuarios } });
    await irDashboard();
  }catch(e){
    if(btn){ btn.disabled=false; btn.textContent='Finalizar configuración'; }
    alert('No se pudo completar:\n\n'+e.message);
  }
}

/* ============ PANTALLAS DE ESTADO ============ */
function pantallaCargando(msg){
  $('#app').innerHTML = `<main class="lienzo login-wrap"><div class="panel" style="text-align:center;color:var(--tinta-60)">
    <div style="margin:0 auto 14px">${isotipo(46)}</div>${esc(msg||'Cargando…')}</div></main>`;
}

/* ============ LOGIN (elegir institución + DNI + clave) ============ */
async function pantallaLogin(){
  pantallaCargando('Cargando instituciones…');
  let insts=[];
  try{ insts = await rpc('kinexa_instituciones') || []; }catch(e){ insts=[]; }
  $('#app').innerHTML = `
    <main class="lienzo login-wrap">
      <div class="panel login-card">
        <div class="login-head">${isotipo(52)}
          <div>
            <div class="nombre" style="font-size:22px;font-weight:600;letter-spacing:-1px">Kine<span style="color:var(--violeta)">xa</span></div>
            <div class="login-inst">Ingresá a tu institución</div>
          </div>
        </div>
        <div class="campo" style="margin-top:18px">
          <label class="lab">Institución</label>
          <select class="txt" id="lgInst">
            ${insts.length ? insts.map(i=>`<option value="${i.id}">${esc(i.nombre)}</option>`).join('')
                           : `<option value="">(todavía no hay instituciones registradas)</option>`}
          </select>
        </div>
        <div class="campo">
          <label class="lab">DNI</label>
          <input class="txt" id="lgDni" inputmode="numeric" placeholder="Sin puntos" onkeydown="if(event.key==='Enter')intentarLogin()">
        </div>
        <div class="campo">
          <label class="lab">Clave</label>
          <input class="txt" id="lgClave" type="password" placeholder="La primera vez: tu DNI" onkeydown="if(event.key==='Enter')intentarLogin()">
        </div>
        <div id="lgError" class="aviso aviso-warn" style="display:none"></div>
        <button class="btn btn-primario" id="btnLogin" style="width:100%;margin-top:8px" onclick="intentarLogin()">Ingresar</button>
        <p style="text-align:center;margin-top:14px"><button class="btn btn-fantasma btn-sm" onclick="pantallaInicio()">← Volver</button></p>
      </div>
    </main>`;
}
async function intentarLogin(){
  const instId = parseInt(($('#lgInst').value||''),10);
  const dni=($('#lgDni').value||'').trim();
  const clave=($('#lgClave').value||'').trim();
  const err=$('#lgError'); const btn=$('#btnLogin');
  const fallo=m=>{ err.textContent=m; err.style.display='block'; btn.disabled=false; btn.textContent='Ingresar'; };
  if(!instId){ fallo('Elegí una institución.'); return; }
  if(!dni||!clave){ fallo('Completá DNI y clave.'); return; }
  btn.disabled=true; btn.textContent='Ingresando…';
  let rows;
  try{ rows = await rpc('kinexa_login', { p_institucion_id:instId, p_dni:dni, p_clave:clave }); }
  catch(e){ fallo('No se pudo conectar. Reintentá.'); return; }
  if(!rows || rows.length===0){ fallo('DNI o clave incorrectos.'); return; }
  guardarSesion(rows[0]);
  await irDashboard();
}
async function salir(){ try{ await rpc('kinexa_logout',{ p_token:TOKEN }); }catch(e){} limpiarSesion(); pantallaInicio(); }

/* ============ PANTALLA PRINCIPAL (provisoria) ============ */
async function irDashboard(){
  pantallaCargando('Cargando…');
  let sectores=[];
  try{ sectores = await rpc('kinexa_sectores', { p_token:TOKEN }) || []; }catch(e){ sectores=[]; }
  pantallaDashboard(sectores);
}
function pantallaDashboard(sectores){
  const u=USER||{};
  const totalCamas=sectores.reduce((a,s)=>a+((s.camas&&s.camas.length)||0),0);
  $('#app').innerHTML = `
    <div class="dash">
      <header class="topbar">
        <div class="tb-left">
          ${u.institucion_logo?`<img class="tb-logo" src="${u.institucion_logo}">`:isotipo(34)}
          <div>
            <div class="tb-inst">${esc(u.institucion_nombre||'')}</div>
            <div class="tb-sub">Kine<span style="color:var(--lila)">xa</span> · ${sectores.length} sectores · ${totalCamas} camas</div>
          </div>
        </div>
        <div class="tb-right">
          <div class="tb-user">${esc(u.nombre||'')} ${esc(u.apellido||'')} ${u.es_admin?'<span class="badge-adm">Admin</span>':''}</div>
          <button class="btn btn-fantasma btn-sm" onclick="salir()">Salir</button>
        </div>
      </header>
      <main class="dash-body"><div class="dash-inner">
        <div class="dash-title">
          <h1>Mapa de camas</h1>
          ${u.es_admin?`<button class="btn btn-fantasma btn-sm" onclick="editar()">Configuración</button>`:''}
        </div>
        <div class="sec-grid">
          ${sectores.map(s=>`
            <div class="item" style="margin:0">
              <div class="item-top"><span class="t">${esc(s.nombre)}</span><span class="hint">${(s.camas||[]).length} camas</span></div>
              <div class="chips">${(s.camas||[]).map(cm=>`<span class="chip">${esc(cm)}</span>`).join('')||'<span class="hint">Sin camas</span>'}</div>
            </div>`).join('')||'<div class="vacio">Sin sectores cargados.</div>'}
        </div>
        <p class="hint" style="margin-top:26px">Próximo hito: traer el motor clínico (evoluciones, ARM, deglución, decanulación…). Los datos ya viven en la base central de Kinexa, aislados por institución.</p>
      </div></main>
    </div>`;
}

/* ============ EDITAR CONFIGURACIÓN (admin) ============ */
async function editar(){
  pantallaCargando('Cargando configuración…');
  try{
    const sectores = await rpc('kinexa_sectores', { p_token:TOKEN }) || [];
    cfg.institucion = { nombre:(USER&&USER.institucion_nombre)||'', logo:(USER&&USER.institucion_logo)||'' };
    cfg.sectores = sectores.map(s=>({ id:uid++, nombre:s.nombre, tipo:'personalizado', cantidad:'', personalizado:(s.camas||[]).join(', ') }));
    cfg.usuarios = [];
    modoEdicion = true; paso=1; render();
  }catch(e){ alert('No se pudo cargar la configuración: '+e.message); pantallaInicio(); }
}
function cancelarWizard(){ if(modoEdicion && TOKEN){ modoEdicion=false; irDashboard(); } else { pantallaInicio(); } }

/* ============ ARRANQUE ============ */
async function init(){
  TOKEN = localStorage.getItem('kinexa_token');
  try{ USER = JSON.parse(localStorage.getItem('kinexa_user')||'null'); }catch(e){ USER=null; }
  if(TOKEN && USER){ await irDashboard(); return; }
  pantallaInicio();
}
init();
</script>
